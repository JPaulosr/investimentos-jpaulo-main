name: Robô Proventos (Diário 12h)

on:
  schedule:
    # 15:00 UTC = 12:00 Brasil
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  run-robot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Dependências
        run: |
          pip install requests pandas gspread google-auth beautifulsoup4 yfinance

      - name: Executar Robô
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SHEET_ID_NOVO: ${{ secrets.SHEET_ID_NOVO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python jobs/proventos_job.py
