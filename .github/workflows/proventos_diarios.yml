name: Proventos Diários

on:
  schedule:
    - cron: "0 9 * * *"  # todo dia às 09:00 UTC (06:00 Brasil UTC-3)
  workflow_dispatch:

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar robô de proventos
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Google Sheets (opcional, mas recomendado)
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SHEET_ID_NOVO: ${{ secrets.SHEET_ID_NOVO }}

          # Ajustes do alerta
          LOOKAHEAD_DAYS: "30"
          TZ_OFFSET_HOURS: "-3"
        run: |
          python alerts/proventos_diarios.py
